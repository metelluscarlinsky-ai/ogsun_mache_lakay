<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enskri kòm Afilye - OGSUN</title>
    <link rel="stylesheet" href="../public/toast.css">
    <script src="../public/toast.js" defer></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { 
            display:flex; justify-content:center; align-items:center; min-height:100vh; 
            background: linear-gradient(135deg, #0a3d0a, #1e5e1e);
            font-family: 'Space Grotesk', sans-serif;
        }
        .container {
            background: white; padding: 50px 40px; border-radius: 24px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4); width: 450px; text-align:center;
        }
        h2 { color:#0a3d0a; margin-bottom:10px; }
        p { color:#666; margin-bottom:25px; }
        input { display:block; width:100%; margin:15px 0; padding:16px; border:2px solid #e0d6c2; border-radius:12px; font-size:1rem; }
        button { background:#d4a017; color:white; border:none; padding:16px; width:100%; border-radius:12px; font-weight:700; cursor:pointer; font-size:1.1rem; }
        button:hover { background:#0a3d0a; }
    </style>
</head>
<body>
<div class="container">
    <h2>📝 Enskri kòm Afilye</h2>
    <p>Ranpli fòmilè a pou w jwenn kòd afilye w.</p>
    <form id="registerForm">
        <input type="text" id="name" placeholder="👤 Non konplè" required>
        <input type="email" id="email" placeholder="📧 Email" required>
        <input type="text" id="phone" placeholder="📞 Telefòn" required>
        <button type="submit">🚀 Enskri</button>
    </form>
    <p style="margin-top:20px;">Deja gen kòd? <a href="login.html" style="color:#d4a017;">Konekte</a></p>
</div>

<script>
document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const name = document.getElementById('name').value.trim();
    
    // Kòd senp: AF + nimewo random
    const code = 'AF' + Math.floor(Math.random() * 9000 + 1000);
    
    Toast.success('✅ Enskripsyon reyisi! Kòd ou: ' + code);
    
    localStorage.setItem('affiliate_code', code);
    localStorage.setItem('affiliate_name', name);
    
    setTimeout(() => window.location.href = 'dashboard.html', 1500);
});
</script>
</body>
</html>
