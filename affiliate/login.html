<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Afilye Login - OGSUN MACHE LAKAY</title>
    <link rel="stylesheet" href="../public/style.css">
    <link rel="stylesheet" href="../public/toast.css">
    <script src="../public/toast.js" defer></script>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--primary) 0%, #1a5c1a 100%);
        }
        .login-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            padding: 50px 40px;
            border-radius: 24px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            width: 420px;
            text-align: center;
            border: 1px solid rgba(212,160,23,0.3);
        }
        .login-container img {
            width: 80px;
            border-radius: 50%;
            margin-bottom: 20px;
            border: 3px solid var(--gold);
        }
        .login-container h2 {
            color: var(--primary);
            margin-bottom: 10px;
            font-size: 1.8rem;
        }
        .login-container p {
            color: #666;
            margin-bottom: 25px;
        }
        .login-container input {
            display: block;
            width: 100%;
            margin: 15px 0;
            padding: 16px;
            border: 2px solid #e0d6c2;
            border-radius: 12px;
            font-size: 1.1rem;
            text-align: center;
            font-weight: 700;
            letter-spacing: 2px;
            font-family: inherit;
            transition: all 0.3s;
        }
        .login-container input:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(212,160,23,0.2);
        }
        .login-container button {
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            color: var(--primary);
            border: none;
            padding: 16px;
            width: 100%;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            font-size: 1.1rem;
            margin-top: 15px;
            transition: all 0.3s;
        }
        .login-container button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(212,160,23,0.4);
        }
        .login-container button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .msg {
            margin-top: 15px;
            font-weight: 600;
            min-height: 24px;
        }
        .codes-box {
            background: #fef9e7;
            padding: 15px;
            border-radius: 12px;
            margin-top: 20px;
            border: 1px solid rgba(212,160,23,0.3);
        }
        .codes-box strong {
            color: var(--primary);
            display: block;
            margin-bottom: 8px;
        }
        .codes-box span {
            color: #666;
            font-size: 0.9rem;
            word-break: break-all;
        }
    </style>
</head>
<body>

<div class="login-container">
    <img src="../public/logo.png" alt="OGSUN Logo" onerror="this.style.display='none'">
    <h2>🤝 Espas Afilye</h2>
    <p>Antre kòd afilye w la pou w jwenn aksè a dashboard ou.</p>
    
    <input type="text" id="code" placeholder="🔑 Kòd Afilye (AF001)" autocomplete="off">
    
    <button id="btn" onclick="login()">🚀 Konekte</button>
    
    <div id="msg" class="msg"></div>
    
    <div class="codes-box">
        <strong>🔑 Kòd ki disponib:</strong>
        <span id="codesList">Chajman...</span>
    </div>
    
    <p style="margin-top:15px;font-size:0.9rem;">
        <a href="../index.html" style="color:var(--gold);">🏠 Retounen nan Akèy</a>
    </p>
</div>

<script>
// Chaje lis kòd ki disponib yo
async function loadCodes() {
    try {
        const res = await fetch('/api/affiliates');
        const affiliates = await res.json();
        const codes = affiliates.map(a => a.code).join(', ');
        document.getElementById('codesList').textContent = codes || 'AF001, AF002...';
    } catch(e) {
        document.getElementById('codesList').textContent = 'AF001, AF002, AF003...';
    }
}

async function login() {
    const code = document.getElementById('code').value.trim().toUpperCase();
    const btn = document.getElementById('btn');
    const msg = document.getElementById('msg');
    
    if (!code) {
        msg.style.color = 'red';
        msg.textContent = '❌ Antre yon kòd afilye!';
        Toast.warning('⚠️ Antre yon kòd afilye!');
        return;
    }
    
    btn.disabled = true;
    btn.textContent = '⏳ Chajman...';
    msg.textContent = '';
    
    try {
        const res = await fetch('/api/affiliates');
        const affiliates = await res.json();
        const affiliate = affiliates.find(a => a.code === code);
        
        if (affiliate) {
            msg.style.color = 'green';
            msg.textContent = '✅ Byenveni, ' + affiliate.name + '! 🎉';
            
            localStorage.setItem('affiliate_code', affiliate.code);
            localStorage.setItem('affiliate_name', affiliate.name);
            
            Toast.success('✅ Byenveni, ' + affiliate.name + '!');
            launchConfetti();
            
            setTimeout(function() {
                window.location.href = 'dashboard.html';
            }, 1200);
        } else {
            msg.style.color = 'red';
            msg.textContent = '❌ Kòd pa valid! Eseye youn nan lis la.';
            Toast.error('❌ Kòd pa valid!');
        }
    } catch (err) {
        console.error('Erè:', err);
        msg.style.color = 'red';
        msg.textContent = '❌ Erè koneksyon! Sèvè a disponib?';
        Toast.error('❌ Erè koneksyon!');
    }
    
    btn.disabled = false;
    btn.textContent = '🚀 Konekte';
}

// Peze Enter pou konekte
document.getElementById('code').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') login();
});

// Chaje lis kòd yo lè paj la ouvri
loadCodes();
</script>

</body>
</html>
