<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Afilye Login - OGSUN</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            display:flex; justify-content:center; align-items:center;
            min-height:100vh; background:linear-gradient(135deg,#0a3d0a,#1e5e1e);
            font-family:'Segoe UI',Arial,sans-serif;
        }
        .box {
            background:white; padding:40px 35px; border-radius:20px;
            width:400px; text-align:center; box-shadow:0 20px 50px rgba(0,0,0,0.4);
        }
        .box img { width:70px; border-radius:50%; margin-bottom:15px; border:3px solid #d4a017; }
        .box h2 { color:#0a3d0a; margin-bottom:5px; }
        .box p { color:#666; margin-bottom:20px; font-size:0.9rem; }
        .box input {
            display:block; width:100%; margin:12px 0; padding:15px;
            border:2px solid #ddd; border-radius:10px; font-size:16px;
            text-align:center; font-weight:bold; letter-spacing:2px;
            text-transform:uppercase;
        }
        .box input:focus { outline:none; border-color:#d4a017; }
        .box button {
            background:#d4a017; color:#0a3d0a; border:none;
            padding:15px; width:100%; border-radius:10px;
            font-weight:bold; font-size:17px; cursor:pointer; margin-top:10px;
        }
        .box button:hover { background:#f0c75e; }
        .box button:disabled { background:#ccc; cursor:not-allowed; }
        .msg { margin-top:12px; font-weight:600; min-height:22px; }
        .codes-box {
            background:#fef9e7; padding:12px; border-radius:10px;
            margin-top:18px; border:1px solid rgba(212,160,23,0.3);
            max-height:90px; overflow-y:auto; font-size:0.85rem;
        }
    </style>
</head>
<body>

<div class="box">
    <img src="../public/logo.png" alt="OGSUN" onerror="this.style.display='none'">
    <h2>🤝 Espas Afilye</h2>
    <p>Antre kòd afilye w la</p>
    
    <input type="text" id="code" placeholder="KÒD AFILYE" autocomplete="off" maxlength="10">
    
    <button id="btn" onclick="login()">🚀 Konekte</button>
    
    <div id="msg" class="msg"></div>
    
    <div class="codes-box">
        <strong>Kòd disponib:</strong>
        <span id="codesList">Chajman...</span>
    </div>
</div>

<script>
async function loadCodes() {
    try {
        const res = await fetch('/api/affiliates');
        const data = await res.json();
        if (data.length > 0) {
            document.getElementById('codesList').textContent = data.map(a => a.code).join(', ');
        } else {
            document.getElementById('codesList').textContent = 'Pa gen kòd ankò';
        }
    } catch(e) {
        document.getElementById('codesList').textContent = 'AF001, AF002...';
    }
}

async function login() {
    const code = document.getElementById('code').value.trim().toUpperCase();
    const btn = document.getElementById('btn');
    const msg = document.getElementById('msg');
    
    if (!code) {
        msg.style.color = 'red';
        msg.textContent = '❌ Antre yon kòd!';
        return;
    }
    
    btn.disabled = true;
    btn.textContent = '⏳ Chajman...';
    msg.textContent = '';
    
    try {
        const res = await fetch('/api/affiliates');
        const data = await res.json();
        const found = data.find(a => a.code === code);
        
        if (found) {
            msg.style.color = 'green';
            msg.textContent = '✅ ' + found.name + ' — Konekte!';
            localStorage.setItem('affiliate_code', found.code);
            localStorage.setItem('affiliate_name', found.name);
            setTimeout(() => window.location.href = 'dashboard.html', 800);
        } else {
            msg.style.color = 'red';
            msg.textContent = '❌ Kòd pa valid!';
        }
    } catch(e) {
        msg.style.color = 'red';
        msg.textContent = '❌ Sèvè pa disponib!';
    }
    
    btn.disabled = false;
    btn.textContent = '🚀 Konekte';
}

document.getElementById('code').addEventListener('keypress', e => {
    if (e.key === 'Enter') login();
});

loadCodes();
</script>
</body>
</html>
