<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - OGSUN</title>
    <link rel="stylesheet" href="../public/toast.css">
    <script src="../public/toast.js" defer></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { 
            display:flex; justify-content:center; align-items:center; min-height:100vh; 
            background: linear-gradient(135deg, #0a3d0a 0%, #1e5e1e 100%);
            font-family: 'Space Grotesk', 'Poppins', sans-serif;
        }
        .login-container {
            background: rgba(255,255,255,0.95);
            padding: 50px 40px;
            border-radius: 24px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            width: 400px;
            text-align: center;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity:0; transform:translateY(30px); }
            to { opacity:1; transform:translateY(0); }
        }
        .login-container img { 
            width: 80px; 
            border-radius: 50%; 
            margin-bottom: 20px; 
            border: 3px solid #d4a017; 
        }
        .login-container h2 { 
            color: #0a3d0a; 
            margin-bottom: 10px; 
            font-size: 1.8rem; 
        }
        .login-container p {
            color: #666;
            margin-bottom: 25px;
        }
        .login-container input { 
            display: block; 
            width: 100%; 
            margin: 15px 0; 
            padding: 16px;
            border: 2px solid #e0d6c2; 
            border-radius: 12px; 
            font-size: 1rem;
            transition: all 0.3s;
            font-family: inherit;
        }
        .login-container input:focus { 
            outline: none; 
            border-color: #d4a017; 
            box-shadow: 0 0 0 3px rgba(212,160,23,0.2); 
        }
        .login-container button { 
            background: linear-gradient(135deg, #d4a017, #f0c75e);
            color: #0a3d0a; 
            border: none; 
            padding: 16px; 
            width: 100%;
            border-radius: 12px; 
            font-weight: 700; 
            cursor: pointer; 
            font-size: 1.1rem;
            margin-top: 15px;
            transition: all 0.3s;
        }
        .login-container button:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 10px 30px rgba(212,160,23,0.4); 
        }
        .login-container button:active {
            transform: scale(0.98);
        }
        .error { 
            color: #e74c3c; 
            margin-top: 12px; 
            font-weight: 600; 
            min-height: 20px;
        }
    </style>
</head>
<body>
<div class="login-container">
    <img src="../public/logo.png" alt="OGSUN Logo" onerror="this.style.display='none'">
    <h2>🔐 Admin OGSUN</h2>
    <p>Antre idantifyan w yo pou w jere boutik la.</p>
    <form id="loginForm">
        <input type="email" id="email" placeholder="📧 Email" value="metelluscarlinsky@gmail.com" required>
        <input type="password" id="password" placeholder="🔒 Modpas" value="OGPLUG45" required>
        <input type="text" id="secret" placeholder="🔑 Kòd Sekrè" required>
        <button type="submit" id="loginBtn">🚀 Konekte</button>
    </form>
    <div id="error" class="error"></div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();
    const secret = document.getElementById('secret').value.trim();
    const btn = document.getElementById('loginBtn');
    const errorDiv = document.getElementById('error');
    
    // Verifye chan yo
    if (!email || !password || !secret) {
        errorDiv.textContent = '❌ Ranpli tout chan yo!';
        Toast.warning('⚠️ Ranpli tout chan yo!');
        return;
    }
    
    // Disable bouton an pandan chajman
    btn.disabled = true;
    btn.innerHTML = '<span style="display:inline-block;animation:spin 0.8s linear infinite;">⏳</span> Chajman...';
    errorDiv.textContent = '';
    
    try {
        const res = await fetch('/api/admin/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                email: email,
                password: password,
                secret_code: secret
            })
        });
        
        const data = await res.json();
        
        if (data.success) {
            localStorage.setItem('admin_token', data.token);
            Toast.success('✅ Koneksyon reyisi! Byenveni Admin! 🎉');
            launchConfetti();
            
            // Redireksyon apre 1 segonn
            setTimeout(function() {
                window.location.href = 'dashboard.html';
            }, 1000);
        } else {
            errorDiv.textContent = '❌ ' + (data.error || 'Idantifyan pa bon!');
            Toast.error('❌ Idantifyan pa bon!');
        }
    } catch (err) {
        errorDiv.textContent = '❌ Erè koneksyon. Eseye ankò.';
        Toast.error('❌ Pa ka konekte ak sèvè a!');
    } finally {
        // Re-aktive bouton an
        btn.disabled = false;
        btn.innerHTML = '🚀 Konekte';
    }
});
</script>
</body>
</html>
