<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Admin Login - OGSUN</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            display:flex; justify-content:center; align-items:center;
            min-height:100vh; background:#0a3d0a;
            font-family:Arial, sans-serif;
        }
        .box {
            background:white; padding:40px; border-radius:20px;
            width:380px; text-align:center;
            box-shadow:0 20px 50px rgba(0,0,0,0.5);
        }
        .box h2 { color:#0a3d0a; margin-bottom:20px; font-size:24px; }
        .box input {
            display:block; width:100%; margin:12px 0; padding:14px;
            border:2px solid #ddd; border-radius:10px; font-size:16px;
        }
        .box input:focus { outline:none; border-color:#d4a017; }
        .box button {
            background:#d4a017; color:white; border:none;
            padding:15px; width:100%; border-radius:10px;
            font-weight:bold; font-size:18px; cursor:pointer;
            margin-top:10px;
        }
        .box button:hover { background:#b8860b; }
        .box button:disabled { background:#ccc; cursor:not-allowed; }
        .msg { margin-top:15px; font-weight:bold; min-height:24px; }
    </style>
</head>
<body>

<div class="box">
    <h2>🔐 Admin OGSUN</h2>
    
    <input type="email" id="email" placeholder="📧 Email" value="metelluscarlinsky@gmail.com">
    <input type="password" id="password" placeholder="🔒 Modpas" value="OGPLUG45">
    <input type="text" id="secret" placeholder="🔑 Kòd Sekrè (carlinsky)">
    
    <button id="btn" onclick="login()">🚀 Konekte</button>
    
    <div id="msg" class="msg"></div>
</div>

<script>
async function login() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();
    const secret = document.getElementById('secret').value.trim();
    const btn = document.getElementById('btn');
    const msg = document.getElementById('msg');
    
    // Verifye chan yo
    if (!email || !password || !secret) {
        msg.style.color = 'red';
        msg.textContent = '❌ Ranpli tout chan yo!';
        return;
    }
    
    // Disable bouton
    btn.disabled = true;
    btn.textContent = '⏳ Chajman...';
    msg.textContent = '';
    
    try {
        const res = await fetch('/api/admin/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                email: email,
                password: password,
                secret_code: secret
            })
        });
        
        const data = await res.json();
        console.log('Repons:', data); // Pou debògaj
        
        if (data.success) {
            msg.style.color = 'green';
            msg.textContent = '✅ Koneksyon reyisi! W ap redireje...';
            
            // Sere token nan localStorage
            localStorage.setItem('admin_token', data.token);
            
            // Redireje apre 1 segonn
            setTimeout(function() {
                window.location.href = 'dashboard.html';
            }, 1000);
        } else {
            msg.style.color = 'red';
            msg.textContent = '❌ ' + (data.error || 'Idantifyan pa bon!');
        }
    } catch (err) {
        msg.style.color = 'red';
        msg.textContent = '❌ Erè koneksyon! Sèvè a disponib?';
        console.error('Erè:', err);
    }
    
    // Re-aktive bouton
    btn.disabled = false;
    btn.textContent = '🚀 Konekte';
}

// Pèmèt peze Enter pou konekte
document.getElementById('secret').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') login();
});
</script>

</body>
</html>
